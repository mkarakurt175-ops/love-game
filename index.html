<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bizim Hikayemiz ❤️</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

canvas {
  display:block;
  margin:0 auto;
  background: linear-gradient(#f7d9a0, #e6b566);
}

/* Başlangıç */
#startScreen, #finalScreen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.7);
  color:white;
}

button {
  padding:15px 30px;
  font-size:20px;
  cursor:pointer;
}

/* Yazı animasyonu */
#finalText {
  font-size:26px;
  text-align:center;
  width:70%;
  line-height:1.5;
  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Bizim Hikayemiz ❤️</h1>
  <button onclick="startGame()">Oyuna Başla</button>
</div>

<div id="finalScreen" style="display:none;">
  <div id="finalText"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 400;

let gameStarted = false;
let finished = false;

// FOTOĞRAFLAR
let playerImg = new Image();
playerImg.src = "erkek.png.jpeg";

let princessImg = new Image();
princessImg.src = "kiz.png.jpeg";

let towerImg = new Image();
towerImg.src = "kule.png.jpeg";

let flowerImg = new Image();
flowerImg.src = "cicek.png.png";

// OYUNCU
let player = {
  x: 50,
  y: 300,
  width: 50,
  height: 50,
  dy: 0,
  jumping: false
};

let gravity = 0.6;
let obstacles = [];
let flowers = [];
let distance = 0;

// BAŞLAT
function startGame(){
  document.getElementById("startScreen").style.display="none";
  gameStarted = true;
  gameLoop();
}

// ENGEL
function createObstacle(){
  let type = Math.random();

  if(type < 0.5){
    obstacles.push({x:900, y:310, w:20, h:40});
  } else {
    obstacles.push({x:900, y:260, w:20, h:90});
  }
}

// ÇİÇEK
function createFlower(){
  flowers.push({x:900, y:300, w:25, h:25});
}

// UPDATE
function update(){
  player.y += player.dy;
  player.dy += gravity;

  if(player.y > 300){
    player.y = 300;
    player.jumping = false;
  }

  obstacles.forEach(o => o.x -= 7);
  flowers.forEach(f => f.x -= 7);

  if(Math.random() < 0.04) createObstacle();
  if(Math.random() < 0.03) createFlower();

  // Çarpışma
  obstacles.forEach(o=>{
    if(
      player.x < o.x + o.w &&
      player.x + player.width > o.x &&
      player.y < o.y + o.h &&
      player.y + player.height > o.y
    ){
      resetGame();
    }
  });

  // Çiçek toplama
  flowers = flowers.filter(f=>{
    if(
      player.x < f.x + f.w &&
      player.x + player.width > f.x &&
      player.y < f.y + f.h &&
      player.y + player.height > f.y
    ){
      return false;
    }
    return true;
  });

  distance += 5;

  if(distance > 4500){
    finished = true;
    gameStarted = false;
    showFinalScene();
  }
}

// ÇİZ
function draw(){
  ctx.clearRect(0,0,900,400);

  // zemin
  ctx.fillStyle="#a36b2c";
  ctx.fillRect(0,350,900,50);

  // oyuncu
  ctx.drawImage(playerImg, player.x, player.y, 50, 50);

  // engeller
  ctx.fillStyle="black";
  obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));

  // çiçek
  flowers.forEach(f=>ctx.drawImage(flowerImg,f.x,f.y,25,25));

  // kule
  ctx.drawImage(towerImg, 780, 200, 100, 160);

  // prenses
  ctx.drawImage(princessImg, 810, 180, 50, 50);
}

// LOOP
function gameLoop(){
  if(!gameStarted) return;

  update();
  draw();

  requestAnimationFrame(gameLoop);
}

// RESET
function resetGame(){
  obstacles = [];
  flowers = [];
  distance = 0;
  player.y = 300;
}

// 💘 FİNAL SAHNESİ
function showFinalScene(){
  document.getElementById("finalScreen").style.display="flex";

  let text = "Gerçek hayatta olduğu gibi oyunda da tüm engelleri aşarak beni buldun ve kavuştuk... Seni çok seviyorum Merve ❤️ Doğukan";

  let i = 0;
  let speed = 40;

  function typeWriter(){
    if(i < text.length){
      document.getElementById("finalText").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    }
  }

  typeWriter();
}

// KONTROLLER
document.addEventListener("keydown", e=>{
  if((e.code==="Space" || e.code==="ArrowUp") && !player.jumping){
    player.dy = -12;
    player.jumping = true;
  }
});
</script>

</body>
</html>
