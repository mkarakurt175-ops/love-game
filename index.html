<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bizim Hikayemiz ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

canvas {
  display: block;
  margin: 0 auto;
  background: linear-gradient(#f7d9a0, #e6b566);
}

#startScreen, #finalScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.7);
  color: white;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  cursor: pointer;
}

#finalText {
  font-size: 28px;
  text-align: center;
  opacity: 0;
  transition: 2s;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Bizim Hikayemiz ❤️</h1>
  <button onclick="startGame()">Oyuna Başla</button>
</div>

<div id="finalScreen" style="display:none;">
  <div id="finalText">
    Gerçek hayatta olduğu gibi oyunda da tüm engelleri aşarak beni buldun ve kavuştuk...  
    Seni çok seviyorum Merve ❤️ Doğukan
  </div>
</div>

<canvas id="game"></canvas>

<audio id="music" loop>
  <!-- İstersen buraya mp3 linki koyacağız -->
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 400;

let gameStarted = false;
let gameOver = false;

// FOTOĞRAFLAR (BURAYA KENDİLERİNİ YÜKLEYECEKSİN)
let playerImg = new Image();
playerImg.src = "erkek.png";

let princessImg = new Image();
princessImg.src = "kiz.png";

let towerImg = new Image();
towerImg.src = "kule.png";

let flowerImg = new Image();
flowerImg.src = "cicek.png";

let player = {
  x: 50,
  y: 300,
  width: 50,
  height: 50,
  dy: 0,
  jumping: false,
  ducking: false
};

let gravity = 0.6;
let obstacles = [];
let flowers = [];
let distance = 0;

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  gameStarted = true;
  gameLoop();
}

// ENGELLER
function createObstacle() {
  let type = Math.random();

  if (type < 0.5) {
    obstacles.push({ x: canvas.width, y: 310, w: 20, h: 40 });
  } else {
    obstacles.push({ x: canvas.width, y: 270, w: 20, h: 80 });
  }
}

// ÇİÇEK
function createFlower() {
  flowers.push({
    x: canvas.width,
    y: 300,
    w: 25,
    h: 25
  });
}

// GÜNCELLE
function update() {
  player.y += player.dy;
  player.dy += gravity;

  if (player.y > 300) {
    player.y = 300;
    player.jumping = false;
  }

  obstacles.forEach(o => o.x -= 6);
  flowers.forEach(f => f.x -= 6);

  if (Math.random() < 0.03) createObstacle();
  if (Math.random() < 0.02) createFlower();

  // ÇARPIŞMA
  obstacles.forEach(o => {
    if (
      player.x < o.x + o.w &&
      player.x + player.width > o.x &&
      player.y < o.y + o.h &&
      player.y + player.height > o.y
    ) {
      resetGame();
    }
  });

  // ÇİÇEK TOPLAMA
  flowers = flowers.filter(f => {
    if (
      player.x < f.x + f.w &&
      player.x + player.width > f.x &&
      player.y < f.y + f.h &&
      player.y + player.height > f.y
    ) {
      return false;
    }
    return true;
  });

  distance += 5;

  if (distance > 4000) finishGame();
}

// ÇİZ
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // zemin
  ctx.fillStyle = "#a36b2c";
  ctx.fillRect(0, 350, canvas.width, 50);

  // oyuncu
  ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

  // engeller
  ctx.fillStyle = "black";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

  // çiçekler
  flowers.forEach(f => ctx.drawImage(flowerImg, f.x, f.y, f.w, f.h));

  // kule
  ctx.drawImage(towerImg, 800, 200, 80, 150);

  // prenses
  ctx.drawImage(princessImg, 810, 180, 50, 50);
}

function gameLoop() {
  if (!gameStarted) return;

  update();
  draw();

  requestAnimationFrame(gameLoop);
}

function resetGame() {
  obstacles = [];
  flowers = [];
  distance = 0;
  player.y = 300;
}

// FİNAL
function finishGame() {
  gameStarted = false;
  document.getElementById("finalScreen").style.display = "flex";

  setTimeout(() => {
    document.getElementById("finalText").style.opacity = 1;
  }, 500);
}

// KONTROLLER
document.addEventListener("keydown", e => {
  if ((e.code === "Space" || e.code === "ArrowUp") && !player.jumping) {
    player.dy = -12;
    player.jumping = true;
  }
});
</script>

</body>
</html>
